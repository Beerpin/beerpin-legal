<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BeerPin – Profil öffnen</title>
  <style>
    html, body { margin: 0; height: 100%; }
    body {
      background: #1A1A2E; color: #FFFFFF;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center; text-align: center;
      padding: 24px; box-sizing: border-box;
    }
    .card { max-width: 360px; width: 100%; }
    .logo { font-size: 64px; margin-bottom: 8px; }
    h1 { font-size: 28px; margin: 0 0 4px; }
    p { color: #A0AEC0; font-size: 16px; margin: 0 0 28px; }
    .btn {
      display: block; text-decoration: none; font-weight: 700; font-size: 16px;
      padding: 14px 18px; border-radius: 12px; margin: 10px 0;
    }
    .primary { background: #F5A623; color: #1A1A2E; }
    .secondary { background: transparent; color: #F5A623; border: 1px solid #F5A623; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🍺</div>
    <h1>BeerPin</h1>
    <p id="msg">Profil wird in der App geöffnet…</p>
    <a class="btn primary" id="openApp" href="#">In der App öffnen</a>
    <a class="btn secondary" id="store" href="https://apps.apple.com/app/id6776305237">Im App Store laden</a>
  </div>
  <script>
    (function () {
      function q(name) {
        var m = new RegExp('[?&]' + name + '=([^&]*)').exec(location.search);
        return m ? decodeURIComponent(m[1].replace(/\+/g, ' ')) : '';
      }
      var STORE = 'https://apps.apple.com/app/id6776305237';
      var id = q('id'), u = q('u');
      var store = document.getElementById('store');
      store.href = STORE;

      // Ohne gültige ID direkt in den App Store.
      if (!id) { location.replace(STORE); return; }

      var appLink = 'beerpin://friend/' + encodeURIComponent(id) +
        (u ? ('?username=' + encodeURIComponent(u)) : '');
      document.getElementById('openApp').href = appLink;

      // App installiert? -> Seite wird in den Hintergrund gedrängt, Timer abbrechen.
      // Nicht installiert? -> nach kurzer Zeit zum App Store.
      var start = Date.now();
      var timer = setTimeout(function () {
        if (Date.now() - start < 2500) { location.replace(STORE); }
      }, 1500);
      function cancel() { clearTimeout(timer); }
      document.addEventListener('visibilitychange', function () { if (document.hidden) cancel(); });
      window.addEventListener('pagehide', cancel);
      window.addEventListener('blur', cancel);

      // App-Öffnen anstoßen.
      location.replace(appLink);
    })();
  </script>
</body>
</html>
